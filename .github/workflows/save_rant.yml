name: Save Quick Upload Rant

on:
  repository_dispatch:
    types: [new-rant-submission]

permissions:
  contents: write

jobs:
  update-logs:
    runs-on: ubuntu-latest
    steps:
# Checkout step (replace existing)
      - name: Checkout Repository Code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Append Form Data to logs.json
        run: |
          PROJECT="${{ github.event.client_payload.project }}"
          COMMENT="${{ github.event.client_payload.comment }}"
          IMAGE_URL="${{ github.event.client_payload.imageUrl }}"
          DATE=$(date +'%Y-%m-%d')
          ID=$(date +%s)

          NEW_ENTRY=$(jq -n \
            --arg id "$ID" \
            --arg date "$DATE" \
            --arg project "$PROJECT" \
            --arg comment "$COMMENT" \
            --arg imageUrl "$IMAGE_URL" \
            '{id: ($id|tonumber), date: $date, project: $project, comment: $comment, imageUrl: $imageUrl}')

          jq ". += [$NEW_ENTRY]" logs.json > tmp.json && mv tmp.json logs.json

# Replace the Commit and Push Changes step with the following
      - name: Commit and Push Changes
        env:
          BRANCH: main
        run: |
          git config --global user.name "ercrunner"
          git config --global user.email "bot@ercava.github.io"
      
          git add logs.json
      
          # If no staged changes, exit successfully
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
      
          git commit -m "system: automated quickuploadrant log entry append [skip ci]"
      
          # Make sure we have latest remote branch and rebase to avoid non-fast-forward
          git fetch origin "$BRANCH"
