<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quip</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        /* Form specific structural scope styling updates */
        .form-wrapper {
            width: 100%;
            max-width: 500px;
            margin-top: 20px;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 24px;
            text-align: left;
            width: 100%;
        }
        .form-group label {
            font-size: 0.8rem;
            font-weight: 600;
            color: #64748b;
            letter-spacing: 0.5px;
        }
        .form-group input[type="text"], 
        .form-group textarea {
            width: 100%;
            padding: 14px;
            background: #111;
            border: 1px solid #222;
            border-radius: 4px;
            color: #fff;
            font-family: inherit;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }
        .form-group input[type="text"]:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: #38bdf8;
        }
        .dropzone-box {
            border: 1px dashed #333;
            background: #0a0a0a;
            border-radius: 4px;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .dropzone-box:hover, .dropzone-box.dragover {
            border-color: #38bdf8;
            background: #111;
        }
        .dropzone-box span {
            font-size: 0.85rem;
            color: #94a3b8;
        }
        #previewContainer {
            margin-top: 12px;
            display: none;
            width: 100%;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #222;
        }
        #previewImg {
            width: 100%;
            display: block;
            height: auto;
        }
        .btn-submit {
            width: 100%;
            background: #fff;
            color: #000;
            border: none;
            padding: 14px;
            font-family: inherit;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .btn-submit:hover {
            background: #38bdf8;
            color: #000;
        }
        .btn-submit:disabled {
            background: #222;
            color: #555;
            cursor: not-allowed;
        }
    </style>
</head>
<body>


    <main class="form-wrapper">
        <form id="rantForm" onsubmit="handleFormSubmit(event)">
            <div class="form-group">
                <label for="projectName">project name</label>
                <input type="text" id="projectName" placeholder="e.g., project darkbox" required>
            </div>

            <div class="form-group">
                <label>file image attachment (or ctrl+v anywhere to paste)</label>
                <div class="dropzone-box" id="dropzone" onclick="document.getElementById('fileInput').click()">
                    <span id="dropzoneText">click to select or press ctrl+v to paste image</span>
                    <input type="file" id="fileInput" style="display: none;" accept="image/*" onchange="handleFileSelect(event)">
                </div>
                <div id="previewContainer">
                    <img id="previewImg" alt="upload pipeline stream preview">
                </div>
            </div>

            <div class="form-group">
                <label for="commentBox">comment / rant details</label>
                <textarea id="commentBox" rows="5" placeholder="type engineering logs or constraints here..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">submit entry</button>
        </form>
    </main>

    <div class="nav-links">
        <a href="../index.html">← back to timeline index</a>
    </div>

    <script>
        const IMGBB_API_KEY = "46762a5e6eda82914445ffc478d66ca5";
        const GITHUB_PAT = "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";
        const REPO_OWNER = "ercava";
        const REPO_NAME = "your-repo-name-here";

        let targetImageFile = null;

        // processing changes from the native upload directory selector
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) displayImagePreview(file);
        }

        // Intercept global paste events (Ctrl + V)
        document.addEventListener('paste', function(e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const blob = items[i].getAsFile();
                    displayImagePreview(blob);
                    
                    // Create a simulated file transfer container list object for your hidden input tag stream
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(blob);
                    document.getElementById('fileInput').files = dataTransfer.files;
                    break;
                }
            }
        });

        function displayImagePreview(file) {
            targetImageFile = file;
            const label = document.getElementById('dropzoneText');
            const container = document.getElementById('previewContainer');
            const img = document.getElementById('previewImg');
            
            label.innerText = `attached image: ${file.name || 'pasted-screenshot.png'}`;
            label.style.color = '#38bdf8';
            
            const reader = new FileReader();
            reader.onload = function(e) {
                img.src = e.target.result;
                container.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }

        // drag and drop visual response handlers
        const dropzone = document.getElementById('dropzone');
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                const file = e.dataTransfer.files[0];
                if (file.type.startsWith('image/')) {
                    document.getElementById('fileInput').files = e.dataTransfer.files;
                    displayImagePreview(file);
                }
            }
        });

        async function handleFormSubmit(e) {
            e.preventDefault();
            const project = document.getElementById('projectName').value;
            const comment = document.getElementById('commentBox').value;
            const submitBtn = e.target.querySelector('.btn-submit');

            submitBtn.innerText = "uploading asset...";
            submitBtn.disabled = true;
            let uploadedImageUrl = "";

            if (targetImageFile) {
                const formData = new FormData();
                formData.append("image", targetImageFile);
                try {
                    const imgbbRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: "POST",
                        body: formData
                    });
                    const imgbbData = await imgbbRes.json();
                    if (imgbbData.success) {
                        uploadedImageUrl = imgbbData.data.url;
                    } else {
                        throw new Error("imgbb upload error rejection.");
                    }
                } catch (err) {
                    alert("asset upload failed: " + err.message);
                    submitBtn.innerText = "submit entry";
                    submitBtn.disabled = false;
                    return;
                }
            }

            submitBtn.innerText = "dispatching automated workflow...";
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
                    method: "POST",
                    headers: {
                        "Authorization": `token ${GITHUB_PAT}`,
                        "Accept": "application/vnd.github.v3+json",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        event_type: "new-rant-submission",
                        client_payload: { project, comment, imageUrl: uploadedImageUrl }
                    })
                });

                if (response.ok) {
                    alert("logged successfully. changes live in ~30s.");
                    document.getElementById('rantForm').reset();
                    document.getElementById('previewContainer').style.display = 'none';
                    document.getElementById('dropzoneText').innerText = "click to select or press ctrl+v to paste image";
                    document.getElementById('dropzoneText').style.color = '#94a3b8';
                    targetImageFile = null;
                } else {
                    alert("error updating remote repository dynamic data stream.");
                }
            } catch (error) {
                alert("network transmission error: " + error.message);
            } finally {
                submitBtn.innerText = "submit entry";
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
