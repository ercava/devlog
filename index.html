<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERCAVA Development Program</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Ercava Development Program</h1>
        <div class="subtitle">Minimalist system development log tracking.</div>
    </header>

    <div class="controls-bar">
        <input type="text" id="searchBar" class="search-box" placeholder="Search comments or projects...">
        
        <div class="filter-group">
            <select id="projectFilter">
                <option value="all">All Projects</option>
                <option value="Project Darkbox">Project Darkbox</option>
                <option value="Project Recalibre">Project Recalibre</option>
                <option value="Sonic Linguistic">Sonic Linguistic</option>
            </select>

            <button class="btn-toggle active" id="sortNewest" onclick="setSort('newest')">Newest</button>
            <button class="btn-toggle" id="sortOldest" onclick="setSort('oldest')">Oldest</button>
        </div>
    </div>

    <main class="timeline" id="timelineContainer">
        </main>

    <div class="nav-links">
        <a href="quickuploadrant.html">→ Go to quickuploadrant</a>
    </div>

    <script>
        let logData = [];
        let currentSort = 'newest';

        async function loadDatabase() {
            try {
                const response = await fetch('logs.json?t=' + new Date().getTime());
                logData = await response.json();
                renderTimeline();
            } catch (err) {
                console.error("Error connecting to data layer:", err);
            }
        }

        function renderTimeline() {
            const searchQuery = document.getElementById('searchBar').value.toLowerCase();
            const projectFilter = document.getElementById('projectFilter').value;
            const container = document.getElementById('timelineContainer');
            
            // Search criteria checks project context and raw comments only
            let filtered = logData.filter(item => {
                const matchesSearch = item.comment.toLowerCase().includes(searchQuery) || item.project.toLowerCase().includes(searchQuery);
                const matchesProject = projectFilter === 'all' || item.project === projectFilter;
                return matchesSearch && matchesProject;
            });

            if (currentSort === 'newest') {
                filtered.sort((a, b) => b.id - a.id);
            } else {
                filtered.sort((a, b) => a.id - b.id);
            }

            container.innerHTML = filtered.map(item => `
                <div class="timeline-item">
                    <div class="meta-line">
                        <span>${item.date}</span>
                        <span class="project-badge">${item.project}</span>
                    </div>
                    
                    <div class="log-comment">${item.comment}</div>
                    
                    ${item.imageUrl ? `
                        <div style="margin-top: 14px; max-width: 500px;">
                            <img src="${item.imageUrl}" style="width: 100%; border-radius: 4px; display: block;" alt="Uploaded Resource Block">
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function setSort(mode) {
            currentSort = mode;
            document.getElementById('sortNewest').classList.toggle('active', mode === 'newest');
            document.getElementById('sortOldest').classList.toggle('active', mode === 'oldest');
            renderTimeline();
        }

        document.getElementById('searchBar').addEventListener('input', renderTimeline);
        document.getElementById('projectFilter').addEventListener('change', renderTimeline);

        loadDatabase();
    </script>
</body>
</html>
