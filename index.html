<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>devlog</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <div class="timeline-view-wrapper">
        <div class="controls-bar">
            <input type="text" id="searchBar" class="search-box" placeholder="search comments or projects...">
            
            <div class="filter-group">
                <select id="projectFilter">
                    </select>

                <button class="btn-toggle active" id="sortNewest" onclick="setSort('newest')">newest</button>
                <button class="btn-toggle" id="sortOldest" onclick="setSort('oldest')">oldest</button>
            </div>
        </div>

        <main class="timeline" id="timelineContainer">
            </main>
    </div>

    <script>
        let logData = [];
        let currentSort = 'newest';

        async function loadDatabase() {
            try {
                const response = await fetch('logs.json?t=' + new Date().getTime());
                logData = await response.json();
                
                populateProjectFilter();
                renderTimeline();
            } catch (err) {
                console.error("error connecting to data layer:", err);
            }
        }

        function populateProjectFilter() {
            const filterSelect = document.getElementById('projectFilter');
            const projects = [...new Set(logData.map(item => item.project).filter(Boolean))];
            
            let optionsHTML = `<option value="all">all projects</option>`;
            optionsHTML += projects.map(proj => `<option value="${proj}">${proj}</option>`).join('');
            
            filterSelect.innerHTML = optionsHTML;
        }

        function renderTimeline() {
            const searchQuery = document.getElementById('searchBar').value.toLowerCase();
            const projectFilter = document.getElementById('projectFilter').value;
            const container = document.getElementById('timelineContainer');
            
            let filtered = logData.filter(item => {
                const commentText = (item.comment || "").toLowerCase();
                const projectText = (item.project || "").toLowerCase();
                const matchesSearch = commentText.includes(searchQuery) || projectText.includes(searchQuery);
                const matchesProject = projectFilter === 'all' || item.project === projectFilter;
                return matchesSearch && matchesProject;
            });

            if (currentSort === 'newest') {
                filtered.sort((a, b) => b.id - a.id);
            } else {
                filtered.sort((a, b) => a.id - b.id);
            }

            container.innerHTML = filtered.map(item => `
                <div class="timeline-item">
                    <div class="meta-line">
                        <span>${item.date}</span>
                        <span class="project-badge">${item.project}</span>
                    </div>
                    
                    <div class="log-comment">${item.comment}</div>
                    
                    ${item.imageUrl ? `
                        <div style="margin-top: 14px; max-width: 500px; width: 100%;">
                            <img src="${item.imageUrl}" style="width: 100%; border-radius: 4px; display: block; margin: 0 auto;" alt="uploaded resource block">
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        function setSort(mode) {
            currentSort = mode;
            document.getElementById('sortNewest').classList.toggle('active', mode === 'newest');
            document.getElementById('sortOldest').classList.toggle('active', mode === 'oldest');
            renderTimeline();
        }

        document.getElementById('searchBar').addEventListener('input', renderTimeline);
        document.getElementById('projectFilter').addEventListener('change', renderTimeline);

        loadDatabase();
    </script>
</body>
</html>
