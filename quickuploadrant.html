<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quick Upload Rant - ERCAVA</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header>
        <h1>Quick Upload Rant</h1>
        <div class="subtitle">Log system modifications, attach files, or dump thoughts.</div>
    </header>

    <main class="form-container">
        <form id="rantForm" onsubmit="handleFormSubmit(event)">
            <div class="form-group">
                <label for="projectName">Project Name</label>
                <input type="text" id="projectName" placeholder="e.g., Project Darkbox" required>
            </div>

            <div class="form-group">
                <label>File Image Upload</label>
                <div class="file-dropzone" onclick="document.getElementById('fileInput').click()">
                    <span id="dropzoneText">Click to select attachment image</span>
                    <input type="file" id="fileInput" style="display: none;" accept="image/*" onchange="updateFileLabel()">
                </div>
            </div>

            <div class="form-group">
                <label for="commentBox">Comment / Rant Details</label>
                <textarea id="commentBox" rows="5" placeholder="Type engineering logs or constraints here..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">Submit Entry</button>
        </form>
    </main>

    <div class="nav-links">
        <a href="index.html">← Back to Timeline Index</a>
    </div>

    <script>
        const IMGBB_API_KEY = "YOUR_IMGBB_API_KEY_HERE";
        const GITHUB_PAT = "YOUR_GITHUB_PERSONAL_ACCESS_TOKEN_HERE";
        const REPO_OWNER = "ercava";
        const REPO_NAME = "your-repo-name-here";

        function updateFileLabel() {
            const input = document.getElementById('fileInput');
            const label = document.getElementById('dropzoneText');
            if (input.files.length > 0) {
                label.innerText = `Selected: ${input.files[0].name}`;
                label.style.color = '#38bdf8';
            }
        }

        async function handleFormSubmit(e) {
            e.preventDefault();
            const project = document.getElementById('projectName').value;
            const comment = document.getElementById('commentBox').value;
            const fileInput = document.getElementById('fileInput');
            const submitBtn = e.target.querySelector('.btn-submit');

            submitBtn.innerText = "Uploading Asset...";
            submitBtn.disabled = true;
            let uploadedImageUrl = "";

            if (fileInput.files.length > 0) {
                const formData = new FormData();
                formData.append("image", fileInput.files[0]);
                try {
                    const imgbbRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: "POST",
                        body: formData
                    });
                    const imgbbData = await imgbbRes.json();
                    if (imgbbData.success) {
                        uploadedImageUrl = imgbbData.data.url;
                    } else {
                        throw new Error("ImgBB configuration rejected payload.");
                    }
                } catch (err) {
                    alert("Image host error: " + err.message);
                    submitBtn.innerText = "Submit Entry";
                    submitBtn.disabled = false;
                    return;
                }
            }

            submitBtn.innerText = "Dispatching Action...";
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
                    method: "POST",
                    headers: {
                        "Authorization": `token ${GITHUB_PAT}`,
                        "Accept": "application/vnd.github.v3+json",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        event_type: "new-rant-submission",
                        client_payload: { project, comment, imageUrl: uploadedImageUrl }
                    })
                });

                if (response.ok) {
                    alert("Entry logged! Processing engine will update the timeline in ~30 seconds.");
                    document.getElementById('rantForm').reset();
                    document.getElementById('dropzoneText').innerText = "Click to select attachment image";
                    document.getElementById('dropzoneText').style.color = '#fff';
                } else {
                    alert("Failed to update repository entry stream.");
                }
            } catch (error) {
                alert("Network communication error: " + error.message);
            } finally {
                submitBtn.innerText = "Submit Entry";
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
