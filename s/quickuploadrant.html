<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>quip</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
<style>
    /* ==========================================
       Form Scope Architecture (Matches Index)
       ========================================== */
    body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 40px 20px;
        background: #050505; /* Balanced base canvas */
    }

    .form-wrapper {
        width: 100%;
        max-width: 500px;
        background: #0a0a0a;
        padding: 40px;
        border: 1px solid #1e293b; /* Index track matching gray */
        border-radius: 6px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 32px;
        text-align: left;
        width: 100%;
    }

    /* Enforce explicit programmatic lowercase alignment */
    .form-group label,
    .btn-submit {
        text-transform: lowercase;
    }

    .form-group label {
        font-size: 0.75rem;
        font-weight: 700;
        color: #475569;
        letter-spacing: 0.05em;
    }

    .form-group input[type="text"], 
    .form-group textarea {
        width: 100%;
        padding: 14px 16px;
        background: #0f172a; /* Controls match search box scheme */
        border: 1px solid #1e293b;
        border-radius: 6px;
        color: #fff;
        font-family: inherit;
        font-size: 0.9rem;
        transition: all 0.2s ease;
    }

    .form-group input[type="text"]:focus, 
    .form-group textarea:focus {
        outline: none;
        border-color: #2563eb; /* Crisp blue active index border */
    }

    /* ==========================================
       Asset Pipeline Stream UI
       ========================================== */
    .dropzone-box {
        border: 1px dashed #1e293b;
        background: #0f172a;
        border-radius: 6px;
        padding: 30px;
        text-align: center;
        cursor: pointer;
        transition: all 0.2s ease;
    }

    .dropzone-box:hover, .dropzone-box.dragover {
        border-color: #2563eb;
        color: #fff;
    }

    .dropzone-box span {
        font-size: 0.85rem;
        color: #94a3b8; /* Matches unselected UI controls color */
    }

    #previewContainer {
        margin-top: 16px;
        display: none;
        width: 100%;
        border-radius: 4px;
        overflow: hidden;
        border: 1px solid #1e293b;
    }

    #previewImg {
        width: 100%;
        display: block;
        height: auto;
    }

    /* ==========================================
       Interactive Controls
       ========================================== */
    .btn-submit {
        width: 100%;
        background: #1d4ed8; /* Matches active sorting selection state */
        color: #fff;
        border: 1px solid #2563eb;
        padding: 14px;
        font-family: inherit;
        font-weight: 600;
        border-radius: 6px;
        cursor: pointer;
        font-size: 0.85rem;
        transition: all 0.2s ease;
    }

    .btn-submit:hover:not(:disabled) {
        background: #2563eb;
    }

    .btn-submit:disabled {
        background: #0f172a;
        border-color: #1e293b;
        color: #475569;
        cursor: not-allowed;
    }

    .nav-links {
        margin-top: 30px;
        font-size: 0.85rem;
        text-align: center;
        width: 100%;
    }

    .nav-links a {
        color: #3b82f6; /* Link dynamic anchor color */
        text-decoration: none;
        transition: opacity 0.2s;
    }

    .nav-links a:hover {
        opacity: 0.8;
    }
</style></head>
<body>


    <main class="form-wrapper">
        <form id="rantForm" onsubmit="handleFormSubmit(event)">
            <div class="form-group">
                <label for="projectName">project name</label>
                <input type="text" id="projectName" placeholder="e.g., project" required>
            </div>

            <div class="form-group">
                <label>file attachment (or ctrl+v anywhere to paste)</label>
                <div class="dropzone-box" id="dropzone" onclick="document.getElementById('fileInput').click()">
                    <span id="dropzoneText">click to select or press ctrl+v to paste image</span>
                    <input type="file" id="fileInput" style="display: none;" accept="image/*" onchange="handleFileSelect(event)">
                </div>
                <div id="previewContainer">
                    <img id="previewImg" alt="upload pipeline stream preview">
                </div>
            </div>

            <div class="form-group">
                <label for="commentBox">comment</label>
                <textarea id="commentBox" rows="5" placeholder="yeah" required></textarea>
            </div>

            <button type="submit" class="btn-submit">submit entry</button>
        </form>
    </main>

    <div class="nav-links">
        <a href="../index.html">← back ←</a>
    </div>

    <script>
        const IMGBB_API_KEY = "46762a5e6eda82914445ffc478d66ca5";
        const GITHUB_PAT = localStorage.getItem('MY_DEVLOG_SECRET') || "";
        const REPO_OWNER = "ercava";
        const REPO_NAME = "devlog";

        let targetImageFile = null;

        // processing changes from the native upload directory selector
        function handleFileSelect(e) {
            const file = e.target.files[0];
            if (file) displayImagePreview(file);
        }

        // Intercept global paste events (Ctrl + V)
        document.addEventListener('paste', function(e) {
            const items = (e.clipboardData || e.originalEvent.clipboardData).items;
            for (let i = 0; i < items.length; i++) {
                if (items[i].type.indexOf('image') !== -1) {
                    const blob = items[i].getAsFile();
                    displayImagePreview(blob);
                    
                    // Create a simulated file transfer container list object for your hidden input tag stream
                    const dataTransfer = new DataTransfer();
                    dataTransfer.items.add(blob);
                    document.getElementById('fileInput').files = dataTransfer.files;
                    break;
                }
            }
        });

        function displayImagePreview(file) {
            targetImageFile = file;
            const label = document.getElementById('dropzoneText');
            const container = document.getElementById('previewContainer');
            const img = document.getElementById('previewImg');
            
            label.innerText = `attached image: ${file.name || 'pasted-screenshot.png'}`;
            label.style.color = '#38bdf8';
            
            const reader = new FileReader();
            reader.onload = function(e) {
                img.src = e.target.result;
                container.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }

        // drag and drop visual response handlers
        const dropzone = document.getElementById('dropzone');
        dropzone.addEventListener('dragover', (e) => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            if (e.dataTransfer.files.length > 0) {
                const file = e.dataTransfer.files[0];
                if (file.type.startsWith('image/')) {
                    document.getElementById('fileInput').files = e.dataTransfer.files;
                    displayImagePreview(file);
                }
            }
        });

        async function handleFormSubmit(e) {
            e.preventDefault();
            const project = document.getElementById('projectName').value;
            const comment = document.getElementById('commentBox').value;
            const submitBtn = e.target.querySelector('.btn-submit');

            submitBtn.innerText = "uploading asset...";
            submitBtn.disabled = true;
            let uploadedImageUrl = "";

            if (targetImageFile) {
                const formData = new FormData();
                formData.append("image", targetImageFile);
                try {
                    const imgbbRes = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: "POST",
                        body: formData
                    });
                    const imgbbData = await imgbbRes.json();
                    if (imgbbData.success) {
                        uploadedImageUrl = imgbbData.data.url;
                    } else {
                        throw new Error("imgbb upload error rejection.");
                    }
                } catch (err) {
                    alert("asset upload failed: " + err.message);
                    submitBtn.innerText = "submit entry";
                    submitBtn.disabled = false;
                    return;
                }
            }

            submitBtn.innerText = "dispatching automated workflow...";
            try {
                const response = await fetch(`https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/dispatches`, {
                    method: "POST",
                    headers: {
                        "Authorization": `token ${GITHUB_PAT}`,
                        "Accept": "application/vnd.github.v3+json",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        event_type: "new-rant-submission",
                        client_payload: { project, comment, imageUrl: uploadedImageUrl }
                    })
                });

                if (response.ok) {
                    alert("logged successfully. changes live in ~30s.");
                    document.getElementById('rantForm').reset();
                    document.getElementById('previewContainer').style.display = 'none';
                    document.getElementById('dropzoneText').innerText = "click to select or press ctrl+v to paste image";
                    document.getElementById('dropzoneText').style.color = '#94a3b8';
                    targetImageFile = null;
                } else {
                    alert("error updating remote repository dynamic data stream.");
                }
            } catch (error) {
                alert("network transmission error: " + error.message);
            } finally {
                submitBtn.innerText = "submit entry";
                submitBtn.disabled = false;
            }
        }
    </script>
</body>
</html>
