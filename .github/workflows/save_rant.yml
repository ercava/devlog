name: Save Quick Upload Rant
on:
  repository_dispatch:
    types: [new-rant-submission]

concurrency:
  group: logs-json-update
  cancel-in-progress: false

jobs:
  update-logs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Append Form Data to logs.json
        run: |
          PROJECT="${{ github.event.client_payload.project }}"
          COMMENT="${{ github.event.client_payload.comment }}"
          IMAGE_URL="${{ github.event.client_payload.imageUrl }}"
          DATE=$(date +'%Y-%m-%d')
          ID=$(date +%s)
          NEW_ENTRY=$(jq -n \
            --arg id "$ID" \
            --arg date "$DATE" \
            --arg project "$PROJECT" \
            --arg comment "$COMMENT" \
            --arg imageUrl "$IMAGE_URL" \
            '{id: ($id|tonumber), date: $date, project: $project, comment: $comment, imageUrl: $imageUrl}')
          echo "$NEW_ENTRY" > new_entry.json
          jq ". += [$NEW_ENTRY]" logs.json > tmp.json && mv tmp.json logs.json

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Ercava Bot"
          git config --global user.email "bot@ercava.dev"

          NEW_ENTRY=$(cat new_entry.json)

          for i in 1 2 3 4 5 6 7 8; do
            git add logs.json
            git commit -m "system: automated quickuploadrant log entry append [skip ci]" || true

            if git push origin main; then
              echo "Push succeeded."
              break
            fi

            echo "Push rejected (attempt $i), re-syncing..."
            sleep $(( (RANDOM % 5) + 1 ))

            git fetch origin main
            git reset --hard origin/main

            jq ". += [$NEW_ENTRY]" logs.json > tmp.json && mv tmp.json logs.json
          done
